<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tiny Care | Nurturing Heroes & Maternal Wellness</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Tailwind CSS (CDN for Dribbble-style prototyping) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        primary: '#38bdf8', // Tiny Care Sky Blue
                        secondary: '#10b981',
                        accent: '#f59e0b',
                        surface: '#0f172a',
                        background: '#020617',
                        sky: {
                            50: '#f0f9ff',
                            100: '#e0f2fe',
                            200: '#bae6fd',
                            400: '#38bdf8',
                            500: '#0ea5e9',
                            600: '#0284c7',
                        },
                        pastel: {
                            green: '#dcfce7',
                            yellow: '#fef9c3',
                            red: '#fee2e2',
                            blue: '#e0e7ff',
                        }
                    },
                    boxShadow: {
                        'dribbble': '0 10px 40px -10px rgba(0,0,0,0.08)',
                        'soft': '0 4px 20px rgba(0,0,0,0.05)',
                    }
                }
            }
        }
    </script>
    <!-- Swiper CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.css" />
    <style>
        body { background-color: theme('colors.background'); }
        /* Custom smooth scrolling and transitions */
        html { scroll-behavior: smooth; }
        .transition-all { transition-duration: 300ms; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="text-slate-300 antialiased selection:bg-primary selection:text-white">

    <!-- Navigation -->
    <nav class="sticky top-0 z-50 bg-slate-900/80 backdrop-blur-md border-b border-slate-800">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <a href="{% url 'index' %}" class="flex items-center gap-2 text-2xl font-bold text-white hover:text-primary transition-colors">
                    <i class="fas fa-heart text-primary"></i>
                    Tiny Care
                </a>
                
                <div class="flex items-center gap-4">
                    {% if user.is_authenticated %}
                        <span class="text-sm font-medium text-slate-500 hidden sm:block">
                            <i class="fas fa-user-circle mr-1"></i> {{ user.username }}
                        </span>
                        {% if user.is_parent %}
                            <div class="flex items-center gap-3">
                                <a href="{% url 'manage_mother_profile' %}" class="bg-slate-800 text-slate-300 hover:bg-slate-700 hover:text-white px-4 py-2 rounded-xl font-semibold border border-slate-700 transition-all">
                                    <i class="fas fa-person-breastfeeding mr-1"></i> Maternal Care
                                </a>
                                <a href="{% url 'add_child' %}" class="bg-primary hover:bg-sky-400 text-slate-950 px-4 py-2 rounded-xl font-semibold shadow-md shadow-primary/20 transition-all transform hover:-translate-y-0.5">
                                    <i class="fas fa-plus mr-1"></i> Add Child
                                </a>
                            </div>
                        {% endif %}
                        <form action="{% url 'logout' %}" method="post" class="inline">
                            {% csrf_token %}
                            <button type="submit" class="text-slate-400 hover:text-slate-200 p-2 rounded-lg hover:bg-slate-800 transition-colors">
                                <i class="fas fa-sign-out-alt text-lg"></i>
                            </button>
                        </form>
                    {% else %}
                        <a href="{% url 'login' %}" class="bg-primary hover:bg-sky-400 text-slate-950 px-6 py-2 rounded-xl font-bold shadow-md shadow-primary/20 transition-all transform hover:-translate-y-0.5">
                            Sign In
                        </a>
                    {% endif %}
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        {% block content %}{% endblock %}
    </main>

    <!-- External Libraries -->
    <!-- Swiper JS -->
    <script src="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.js"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    {% block extra_scripts %}{% endblock %}
</body>
</html>
